<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GUI Icons - TinyVG Canvas Renderer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    h1 {
      color: white;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }
    .subtitle {
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 30px;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      border-radius: 12px;
      background: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .legend {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      max-width: 520px;
    }
    .legend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .legend-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
    .legend-item .icon-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .legend-item .icon-path {
      font-size: 11px;
      color: #888;
    }
    .stats {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      min-width: 300px;
    }
    .stats h3 {
      margin-top: 0;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .stats table {
      border-collapse: collapse;
      width: 100%;
    }
    .stats td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
    }
    .stats td:first-child {
      font-weight: 600;
      color: #666;
    }
    .stats tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <h1>GUI Icons Gallery</h1>
  <p class="subtitle">TinyVG rendered UI elements from SVG source</p>
  <div class="container">
    <canvas id="iconCanvas" width=520 height=200></canvas>
    <div class="legend">
      <div class="legend-item">
        <span class="icon-name">chevron-down</span>
        <span class="icon-path">chevron-down.svg</span>
      </div>
      <div class="legend-item">
        <span class="icon-name">chevron-right</span>
        <span class="icon-path">chevron-right.svg</span>
      </div>
      <div class="legend-item">
        <span class="icon-name">trash</span>
        <span class="icon-path">trash.svg</span>
      </div>
    </div>
    <div class="stats">
      <h3>Rendering Statistics</h3>
      <table>
        <tr><td>Total Icons:</td><td>3</td></tr>
        <tr><td>Canvas Size:</td><td>520 × 200</td></tr>
        <tr><td>Icon Size:</td><td>120 × 120</td></tr>
        <tr><td>Total Colors:</td><td>3</td></tr>
        <tr><td>Total Commands:</td><td>7</td></tr>
        <tr><td>Avg Colors/Icon:</td><td>1</td></tr>
        <tr><td>Avg Commands/Icon:</td><td>2</td></tr>
      </table>
    </div>
  </div>
  <script>
    // SVG Arc to Canvas Bezier helper function
    function renderArc(ctx, x0, y0, rx, ry, phi, largeArc, sweep, x, y) {
      if (rx === 0 || ry === 0) {
        ctx.lineTo(x, y);
        return;
      }
      rx = Math.abs(rx); ry = Math.abs(ry);
      var phiRad = phi * Math.PI / 180;
      var cosPhi = Math.cos(phiRad);
      var sinPhi = Math.sin(phiRad);
      var dx = (x0 - x) / 2;
      var dy = (y0 - y) / 2;
      var x1p = cosPhi * dx + sinPhi * dy;
      var y1p = -sinPhi * dx + cosPhi * dy;
      var lambda = (x1p * x1p) / (rx * rx) + (y1p * y1p) / (ry * ry);
      if (lambda > 1) {
        var sqrtLambda = Math.sqrt(lambda);
        rx *= sqrtLambda;
        ry *= sqrtLambda;
      }
      var factor = Math.sqrt(Math.max(0, (rx * rx * ry * ry - rx * rx * y1p * y1p - ry * ry * x1p * x1p) / (rx * rx * y1p * y1p + ry * ry * x1p * x1p)));
      if (largeArc === sweep) factor = -factor;
      var cxp = factor * rx * y1p / ry;
      var cyp = -factor * ry * x1p / rx;
      var cx = cosPhi * cxp - sinPhi * cyp + (x0 + x) / 2;
      var cy = sinPhi * cxp + cosPhi * cyp + (y0 + y) / 2;
      var theta1 = Math.atan2((y1p - cyp) / ry, (x1p - cxp) / rx);
      var theta2 = Math.atan2((-y1p - cyp) / ry, (-x1p - cxp) / rx);
      var deltaTheta = theta2 - theta1;
      if (!sweep && deltaTheta > 0) deltaTheta -= 2 * Math.PI;
      if (sweep && deltaTheta < 0) deltaTheta += 2 * Math.PI;
      var segments = Math.ceil(Math.abs(deltaTheta) / (Math.PI / 2));
      segments = Math.max(1, segments);
      var eta1 = theta1;
      var cosEta = Math.cos(eta1);
      var sinEta = Math.sin(eta1);
      var epX = cosPhi * rx * cosEta - sinPhi * ry * sinEta + cx;
      var epY = sinPhi * rx * cosEta + cosPhi * ry * sinEta + cy;
      var alpha = Math.sin(Math.abs(deltaTheta) / segments / 2) * 4 / 3;
      for (var i = 0; i < segments; i++) {
        var eta2 = eta1 + deltaTheta / segments;
        var cosEta2 = Math.cos(eta2);
        var sinEta2 = Math.sin(eta2);
        var epX2 = cosPhi * rx * cosEta2 - sinPhi * ry * sinEta2 + cx;
        var epY2 = sinPhi * rx * cosEta2 + cosPhi * ry * sinEta2 + cy;
        var dX = -cosPhi * rx * sinEta - sinPhi * ry * cosEta;
        var dY = -sinPhi * rx * sinEta + cosPhi * ry * cosEta;
        var cp1x = epX + alpha * dX;
        var cp1y = epY + alpha * dY;
        dX = -cosPhi * rx * sinEta2 - sinPhi * ry * cosEta2;
        dY = -sinPhi * rx * sinEta2 + cosPhi * ry * cosEta2;
        var cp2x = epX2 - alpha * dX;
        var cp2y = epY2 - alpha * dY;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, epX2, epY2);
        eta1 = eta2;
        cosEta = cosEta2;
        sinEta = sinEta2;
        epX = epX2;
        epY = epY2;
      }
    }

    const canvas = document.getElementById('iconCanvas');
    const ctx = canvas.getContext('2d');
    
    // Clear canvas with white background
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Render chevron-down.svg
    ctx.save();
    ctx.translate(40, 40);
    ctx.scale(5.0, 5.0);
// Draw line strip
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(6.0, 9.0);
ctx.lineTo(12.0, 15.0);
ctx.lineTo(18.0, 9.0);
ctx.stroke();


    ctx.restore();

    // Draw subtle border and label for chevron-down.svg
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.strokeRect(40, 40, 120, 120);
    ctx.fillStyle = '#666';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('chevron-down', 100, 180);

    // Render chevron-right.svg
    ctx.save();
    ctx.translate(200, 40);
    ctx.scale(5.0, 5.0);
// Draw line strip
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(9.0, 18.0);
ctx.lineTo(15.0, 12.0);
ctx.lineTo(9.0, 6.0);
ctx.stroke();


    ctx.restore();

    // Draw subtle border and label for chevron-right.svg
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.strokeRect(200, 40, 120, 120);
    ctx.fillStyle = '#666';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('chevron-right', 260, 180);

    // Render trash.svg
    ctx.save();
    ctx.translate(360, 40);
    ctx.scale(5.0, 5.0);
// Path command
ctx.beginPath();
var curX = 3.0;
var curY = 6.0;
ctx.moveTo(curX, curY);
ctx.lineTo(3.0, 6.0);
curX = 3.0; curY = 6.0;
ctx.lineTo(21.0, 6.0);
curX = 21.0; curY = 6.0;
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.stroke();

// Path command
ctx.beginPath();
var curX = 19.0;
var curY = 6.0;
ctx.moveTo(curX, curY);
ctx.lineTo(19.0, 6.0);
curX = 19.0; curY = 6.0;
ctx.lineTo(19.0, 20.0);
curX = 19.0; curY = 20.0;
ctx.bezierCurveTo(19.0, 21.0, 18.0, 22.0, 17.0, 22.0);
curX = 17.0; curY = 22.0;
ctx.lineTo(7.0, 22.0);
curX = 7.0; curY = 22.0;
ctx.bezierCurveTo(6.0, 22.0, 5.0, 21.0, 5.0, 20.0);
curX = 5.0; curY = 20.0;
ctx.lineTo(5.0, 6.0);
curX = 5.0; curY = 6.0;
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.stroke();

// Path command
ctx.beginPath();
var curX = 8.0;
var curY = 6.0;
ctx.moveTo(curX, curY);
ctx.lineTo(8.0, 6.0);
curX = 8.0; curY = 6.0;
ctx.lineTo(8.0, 4.0);
curX = 8.0; curY = 4.0;
ctx.bezierCurveTo(8.0, 3.0, 9.0, 2.0, 10.0, 2.0);
curX = 10.0; curY = 2.0;
ctx.lineTo(14.0, 2.0);
curX = 14.0; curY = 2.0;
ctx.bezierCurveTo(15.0, 2.0, 16.0, 3.0, 16.0, 4.0);
curX = 16.0; curY = 4.0;
ctx.lineTo(16.0, 6.0);
curX = 16.0; curY = 6.0;
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.stroke();

// Draw lines
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(10.0, 11.0);
ctx.lineTo(10.0, 17.0);
ctx.stroke();

// Draw lines
ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(14.0, 11.0);
ctx.lineTo(14.0, 17.0);
ctx.stroke();


    ctx.restore();

    // Draw subtle border and label for trash.svg
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.strokeRect(360, 40, 120, 120);
    ctx.fillStyle = '#666';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('trash', 420, 180);
  </script>
</body>
</html>
